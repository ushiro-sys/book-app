<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>読書記録</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <button id="back-button">←</button>
  <h1>読書記録</h1>
</header>

<main>

<section id = "bookshelf-screen">
  <h2>本棚</h2>
<!-- 本が0冊のとき-->
 <p id="empty-message">本を登録してください</p>
<!-- 本があるとき-->
  <div class="book-grid" id="book-grid">

  </div>

  <button class="add-button">＋</button>
</section>

<section id="detail-screen" hidden>
  <h2>本の詳細</h2>

  <div class="detail-box">
    <img id="detail-cover" src="./assets/book_done.png" alt="本の表紙" class="detail-cover">

    <div class="detail-info">
      <div class="detail-row">
        <span class="detail-label">タイトル　：</span>
        <span id="detail-title"></span>
      </div>

      <div class="detail-row">
        <span class="detail-label">著者　　　：</span>
        <span id="detail-author"></span>
      </div>

      <div class="detail-row">
        <span class="detail-label">日付　　　：</span>
        <span id="detail-date"></span>
      </div>

      <div class="detail-row">
        <span class="detail-label">ステータス：</span>
        <span id="detail-status"></span>
      </div>

      <div class="detail-rating-block">
        <span class="detail-label">評価　　　：</span>
        <span id="detail-rating"></span>
      </div>
    </div>
  </div>

  <div class="review-box">
    <h3>感想</h3>
    <p id="detail-review"></p>
  </div>

  <div class="detail-actions">
    <button id="edit-button" type="button">編集</button>
    <button id="delete-button" type="button">削除</button>
  </div>
</section>

<section id="form-screen" hidden>
  <h2>本を登録</h2>

  <form class="book-form">
    <label>
  表紙画像
  <input type="file" id="cover-input" accept="image/*">
</label>
    <label>
      タイトル
      <input type="text" placeholder="本のタイトル">
    </label>

    <label>
      著者名
      <input type="text" placeholder="著者名">
    </label>

    <label>
      日付
      <input type="date">
    </label>

    <label>
      ステータス
      <select>
        <option>未読</option>
        <option>読書中</option>
        <option>読了</option>
      </select>
    </label>

    <label>
      評価
      <select>
        <option>★★★★★</option>
        <option>★★★★☆</option>
        <option>★★★☆☆</option>
        <option>★★☆☆☆</option>
        <option>★☆☆☆☆</option>
      </select>
    </label>

    <label>
      感想
      <textarea rows="5" placeholder="感想を書く"></textarea>
    </label>
  </form>
  <button id="save-button" type="submit">保存</button>
</section>
</main>

<script src="script.js"></script>
</body>
</html>
